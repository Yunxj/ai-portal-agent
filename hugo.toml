# ========================================
# Hugo Site Configuration
# ========================================

baseURL = 'https://example.org/'
languageCode = 'zh-CN'
title = 'AI实践个人门户网站'
theme = 'ai-portal-theme'

# ========================================
# Site Information
# ========================================

[params]
  description = "分享AI编码技巧、新技术解析和实战经验，与开发者一起探索人工智能的边界"
  author = "AI实践者"
  keywords = ["AI", "人工智能", "机器学习", "GPT", "Claude", "RAG", "Prompt Engineering"]

  # Social Links
  github = "https://github.com/yourusername"
  twitter = "https://twitter.com/yourusername"
  linkedin = "https://linkedin.com/in/yourusername"
  email = "your.email@example.com"

  # Search
  enableSearch = true

  # Dark Mode
  enableDarkMode = true

  # TOC
  enableTOC = true

  # Code Highlighting
  enableCodeHighlight = true

# ========================================
# Menu Configuration
# ========================================

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 10

  [[menu.main]]
    name = "分类"
    url = "/categories/"
    weight = 20

  [[menu.main]]
    name = "标签"
    url = "/tags/"
    weight = 30

  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 40

# ========================================
# Taxonomies
# ========================================

[taxonomies]
  category = "categories"
  tag = "tags"

# ========================================
# Markup Configuration
# ========================================

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow HTML in Markdown

  [markup.highlight]
    style = "dracula"
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

# ========================================
# Output Formats
# ========================================

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

# ========================================
# Privacy
# ========================================

[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
